version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      # Mapeia a pasta atual (versao-refatorada) para o container
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy # Só sobe o PHP quando o MySQL estiver 100% pronto

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
      # Volta uma pasta (..) para pegar o db.sql na raiz do projeto original
      - ../database/schema.sql:/docker-entrypoint-initdb.d/db.sql
    healthcheck:
      # Tenta dar "ping" no banco usando a senha do .env
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    depends_on:
      mysql:
        condition: service_healthy 

volumes:
  db_data: